<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Postcard Generator V6</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Economica:wght@700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: sans-serif; background-color: #222; color: #333; display: flex; flex-direction: column; min-height: 100vh; }

        /* Controlli */
        #controls { background: #fff; padding: 15px; display: flex; flex-direction: column; gap: 10px; z-index: 100; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }
        label { font-size: 10px; font-weight: bold; color: #8b0000; letter-spacing: 1px; }
        textarea { height: 65px; padding: 10px; font-size: 16px; border: 1px solid #ccc; border-radius: 5px; resize: none; }
        input { padding: 10px; font-size: 16px; border: 1px solid #ccc; border-radius: 5px; }
        #btn-save { background: #8b0000; color: white; padding: 15px; border: none; border-radius: 5px; font-weight: bold; text-transform: uppercase; cursor: pointer; }

        /* Anteprima */
        #viewer { flex-grow: 1; display: flex; justify-content: center; align-items: center; padding: 20px; overflow: hidden; }

        /* QUADRATO ORIGINALE (800x800) */
        #postcard {
            width: 800px;
            height: 800px;
            background-image: url('https://i.ibb.co/fzTQYh2X/immagine.jpg');
            background-size: cover;
            background-position: center;
            display: flex;
            flex-direction: column;
            position: relative;
            background-color: white;
            flex-shrink: 0;
        }

        /* Area Testo Battuta */
        .joke-area {
            height: 75%; /* Occupa i 3/4 superiori */
            width: 85%;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding-top: 20px;
        }

        #display-text {
            font-family: 'Economica', sans-serif;
            font-weight: 700;
            color: #000;
            line-height: 1.0;
            word-wrap: break-word;
            width: 100%;
        }

        /* Area Autore (In fondo) */
        .author-area {
            height: 25%; /* Quarto inferiore */
            display: flex;
            align-items: flex-end; /* Spinge verso il basso */
            justify-content: center;
            padding-bottom: 40px; /* Distanza dal bordo inferiore */
        }

        #display-author {
            font-family: 'Economica', sans-serif;
            font-weight: 700;
            color: #8B0000;
            font-size: 48px; /* Firma bella visibile */
            text-align: center;
        }

        /* Fix visualizzazione Smartphone */
        @media (max-width: 800px) {
            #postcard {
                transform: scale(0.42); /* Adatta il quadrato allo schermo del cell */
                transform-origin: center;
            }
        }
    </style>
</head>
<body>

    <div id="controls">
        <div style="display:flex; flex-direction:column; gap:2px;">
            <label>BATTUTA</label>
            <textarea id="in-text">Inserisci qui il testo della tua cartolina satirica...</textarea>
        </div>
        <div style="display:flex; flex-direction:column; gap:2px;">
            <label>AUTORE</label>
            <input type="text" id="in-author" value="Mauro Morandi">
        </div>
        <button id="btn-save">Salva Immagine</button>
    </div>

    <div id="viewer">
        <div id="postcard">
            <div class="joke-area">
                <h1 id="display-text">Inserisci qui il testo della tua cartolina satirica...</h1>
            </div>
            <div class="author-area">
                <div id="display-author">[Mauro Morandi]</div>
            </div>
        </div>
    </div>

    <script>
        const inText = document.getElementById('in-text');
        const inAuthor = document.getElementById('in-author');
        const displayText = document.getElementById('display-text');
        const displayAuthor = document.getElementById('display-author');
        const postcard = document.getElementById('postcard');

        // Funzione per il ridimensionamento font
        function fitText() {
            let size = 75; // Grandezza massima iniziale (più piccola per non urlare)
            displayText.style.fontSize = size + "px";
            
            // Riduce se il testo è troppo lungo per l'area joke (600px di altezza circa)
            while ((displayText.scrollHeight > 550 || displayText.scrollWidth > 680) && size > 15) {
                size -= 2;
                displayText.style.fontSize = size + "px";
            }
        }

        inText.addEventListener('input', () => {
            displayText.innerText = inText.value;
            fitText();
        });

        inAuthor.addEventListener('input', () => {
            const val = inAuthor.value.trim();
            displayAuthor.innerText = val ? `[${val}]` : "";
        });

        // Funzione Download corretta
        document.getElementById('btn-save').addEventListener('click', () => {
            // Scroll in cima e reset zoom temporaneo per evitare il taglio a sinistra
            window.scrollTo(0,0);
            
            const originalTransform = postcard.style.transform;
            postcard.style.transform = "none"; // Resetta scala per lo scatto perfetto

            html2canvas(postcard, {
                width: 800,
                height: 800,
                scale: 2, // Immagine finale 1600x1600 (alta qualità)
                useCORS: true,
                backgroundColor: "#ffffff"
            }).then(canvas => {
                const link = document.createElement('a');
                link.download = 'cartolina.png';
                link.href = canvas.toDataURL('image/png');
                link.click();
                
                // Ripristina l'anteprima per lo schermo del cell
                postcard.style.transform = originalTransform;
            });
        });

        window.onload = fitText;
    </script>
</body>
</html>
