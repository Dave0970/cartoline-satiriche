<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Postcard HD V7</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Economica:wght@700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: sans-serif; background-color: #1a1a1a; display: flex; flex-direction: column; min-height: 100vh; }

        /* Pannello Controlli */
        #controls { background: #fff; padding: 15px; display: flex; flex-direction: column; gap: 10px; z-index: 100; border-bottom: 3px solid #8b0000; }
        label { font-size: 10px; font-weight: bold; color: #8b0000; text-transform: uppercase; }
        textarea { height: 60px; padding: 10px; font-size: 16px; border: 1px solid #ccc; border-radius: 5px; resize: none; }
        input { padding: 10px; font-size: 16px; border: 1px solid #ccc; border-radius: 5px; }
        #btn-save { background: #8b0000; color: white; padding: 15px; border: none; border-radius: 5px; font-weight: bold; text-transform: uppercase; cursor: pointer; }

        /* Area Anteprima */
        #viewer { flex-grow: 1; display: flex; justify-content: center; align-items: center; padding: 20px; overflow: hidden; }

        /* IL QUADRATO AD ALTA RISOLUZIONE (1024x1024) */
        #postcard {
            width: 1024px;
            height: 1024px;
            background-image: url('https://i.ibb.co/fzTQYh2X/immagine.jpg');
            background-size: cover;
            background-position: center;
            display: flex;
            flex-direction: column;
            position: relative;
            background-color: white;
            flex-shrink: 0;
            /* Forza la resa dell'immagine al massimo */
            image-rendering: -webkit-optimize-contrast;
        }

        /* Area Battuta */
        .joke-area {
            height: 70%; 
            width: 80%;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding-top: 40px;
        }

        #display-text {
            font-family: 'Economica', sans-serif;
            font-weight: 700;
            color: #000;
            line-height: 1.05;
            word-wrap: break-word;
            width: 100%;
        }

        /* Area Autore */
        .author-area {
            height: 30%;
            display: flex;
            align-items: flex-end;
            justify-content: center;
            padding-bottom: 60px;
        }

        #display-author {
            font-family: 'Economica', sans-serif;
            font-weight: 700;
            color: #8B0000;
            font-size: 58px; /* Firma aumentata */
            text-align: center;
        }

        /* Scalatura per smartphone */
        @media (max-width: 1024px) {
            #postcard {
                transform: scale(0.32); /* Più piccolo a video per farlo entrare nel telefono */
                transform-origin: center;
            }
        }
    </style>
</head>
<body>

    <div id="controls">
        <div style="display:flex; flex-direction:column; gap:2px;">
            <label>Battuta</label>
            <textarea id="in-text">Inserisci qui il testo della tua cartolina...</textarea>
        </div>
        <div style="display:flex; flex-direction:column; gap:2px;">
            <label>Autore</label>
            <input type="text" id="in-author" value="Mauro Morandi">
        </div>
        <button id="btn-save">Salva in Alta Qualità</button>
    </div>

    <div id="viewer">
        <div id="postcard">
            <div class="joke-area">
                <h1 id="display-text">Inserisci qui il testo della tua cartolina...</h1>
            </div>
            <div class="author-area">
                <div id="display-author">[Mauro Morandi]</div>
            </div>
        </div>
    </div>

    <script>
        const inText = document.getElementById('in-text');
        const inAuthor = document.getElementById('in-author');
        const displayText = document.getElementById('display-text');
        const displayAuthor = document.getElementById('display-author');
        const postcard = document.getElementById('postcard');

        function fitText() {
            let size = 60; // Partenza più piccola (Elegante)
            displayText.style.fontSize = size + "px";
            
            // Area di contenimento aumentata per 1024px
            while ((displayText.scrollHeight > 650 || displayText.scrollWidth > 850) && size > 15) {
                size -= 2;
                displayText.style.fontSize = size + "px";
            }
        }

        inText.addEventListener('input', () => {
            displayText.innerText = inText.value;
            fitText();
        });

        inAuthor.addEventListener('input', () => {
            const val = inAuthor.value.trim();
            displayAuthor.innerText = val ? `[${val}]` : "";
        });

        document.getElementById('btn-save').addEventListener('click', () => {
            window.scrollTo(0,0);
            const originalTransform = postcard.style.transform;
            postcard.style.transform = "none"; // Reset per lo scatto

            html2canvas(postcard, {
                width: 1024,
                height: 1024,
                scale: 3, // Tripla densità di pixel (Massima nitidezza)
                useCORS: true,
                backgroundColor: "#ffffff",
                imageTimeout: 0,
                logging: false
            }).then(canvas => {
                const link = document.createElement('a');
                link.download = 'cartolina-HD.png';
                link.href = canvas.toDataURL('image/png', 1.0);
                link.click();
                postcard.style.transform = originalTransform;
            });
        });

        window.onload = fitText;
    </script>
</body>
</html>
