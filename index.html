<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Generatore 'O Strunz</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Economica:wght@700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body { 
            font-family: sans-serif; 
            background-color: #1a1a1a; 
            display: flex; 
            flex-direction: column; 
            min-height: 100vh; 
        }

        /* Intestazione Logo */
        #header-logo {
            font-family: 'Economica', sans-serif;
            font-weight: 700;
            color: #8b0000;
            text-align: center;
            background: #fff;
            padding: 10px 5px 0 5px;
            font-size: 22px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* Pannello Controlli */
        #controls { 
            background: #fff; 
            padding: 10px 15px 15px 15px; 
            display: flex; 
            flex-direction: column; 
            gap: 8px; 
            z-index: 100; 
            border-bottom: 3px solid #8b0000;
        }

        label { font-size: 10px; font-weight: bold; color: #444; text-transform: uppercase; }
        
        /* Area di testo più grande */
        textarea { 
            height: 140px; 
            padding: 10px; 
            font-size: 16px; 
            border: 1px solid #ccc; 
            border-radius: 5px; 
            resize: none; 
            font-family: sans-serif;
        }

        input { padding: 10px; font-size: 16px; border: 1px solid #ccc; border-radius: 5px; }
        
        #btn-save { 
            background: #8b0000; 
            color: white; 
            padding: 12px; 
            border: none; 
            border-radius: 5px; 
            font-weight: bold; 
            text-transform: uppercase; 
            cursor: pointer;
            font-size: 16px;
        }

        /* Area Anteprima spostata in alto */
        #viewer { 
            flex-grow: 1; 
            display: flex; 
            justify-content: center; 
            align-items: flex-start; /* Allinea in alto */
            padding: 10px; 
            overflow: hidden; 
        }

        /* IL QUADRATO HD (1024x1024) */
        #postcard {
            width: 1024px;
            height: 1024px;
            background-image: url('sfondo.png'); 
            background-size: cover;
            background-position: center;
            display: flex;
            flex-direction: column;
            position: relative;
            background-color: white;
            flex-shrink: 0;
        }

        /* Area Battuta */
        .joke-area {
            height: 70%; 
            width: 85%;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding-top: 20px;
        }

        #display-text {
            font-family: 'Economica', sans-serif;
            font-weight: 700;
            color: #000;
            line-height: 1.05;
            word-wrap: break-word;
            width: 100%;
            font-size: 75px; /* Fissa a 75px */
        }

        /* Area Autore spostata più in basso */
        .author-area {
            height: 30%;
            display: flex;
            align-items: flex-end;
            justify-content: center;
            padding-bottom: 40px; /* Abbassata ancora di più */
        }

        #display-author {
            font-family: 'Economica', sans-serif;
            font-weight: 700;
            color: #8B0000;
            font-size: 70px; /* Fissa a 70px */
            text-align: center;
        }

        /* Scalatura per smartphone */
        @media (max-width: 1024px) {
            #postcard {
                transform: scale(0.33);
                transform-origin: top center; /* Scalatura dall'alto */
            }
        }
        
        /* Ottimizzazione per PC */
        @media (min-width: 900px) {
            body { flex-direction: row; }
            #header-logo { padding-top: 20px; }
            #left-panel { width: 350px; background: #fff; display: flex; flex-direction: column; height: 100vh; }
            #controls { border-bottom: none; flex-grow: 1; }
            #viewer { align-items: center; }
            #postcard { transform: scale(0.5); transform-origin: center; }
        }
    </style>
</head>
<body>

    <div id="left-panel">
        <div id="header-logo">Generatore di battute per 'O Strunz</div>
        
        <div id="controls">
            <div style="display:flex; flex-direction:column; gap:2px;">
                <label>Battuta</label>
                <textarea id="in-text">Inserisci qui la tua battuta...</textarea>
            </div>
            <div style="display:flex; flex-direction:column; gap:2px;">
                <label>Autore</label>
                <input type="text" id="in-author" value="Mauro Morandi">
            </div>
            <button id="btn-save">Salva Cartolina</button>
        </div>
    </div>

    <div id="viewer">
        <div id="postcard">
            <div class="joke-area">
                <h1 id="display-text">Inserisci qui la tua battuta...</h1>
            </div>
            <div class="author-area">
                <div id="display-author">[Mauro Morandi]</div>
            </div>
        </div>
    </div>

    <script>
        const inText = document.getElementById('in-text');
        const inAuthor = document.getElementById('in-author');
        const displayText = document.getElementById('display-text');
        const displayAuthor = document.getElementById('display-author');
        const postcard = document.getElementById('postcard');

        function fitText() {
            let size = 75; 
            displayText.style.fontSize = size + "px";
            while ((displayText.scrollHeight > 680 || displayText.scrollWidth > 880) && size > 15) {
                size -= 2;
                displayText.style.fontSize = size + "px";
            }
        }

        inText.addEventListener('input', () => {
            displayText.innerText = inText.value;
            fitText();
        });

        inAuthor.addEventListener('input', () => {
            const val = inAuthor.value.trim();
            displayAuthor.innerText = val ? `[${val}]` : "";
        });

        document.getElementById('btn-save').addEventListener('click', () => {
            window.scrollTo(0,0);
            const originalTransform = postcard.style.transform;
            postcard.style.transform = "none";

            html2canvas(postcard, {
                width: 1024,
                height: 1024,
                scale: 3, 
                useCORS: true,
                backgroundColor: null
            }).then(canvas => {
                const link = document.createElement('a');
                link.download = 'cartolina-O-Strunz.png';
                link.href = canvas.toDataURL('image/png', 1.0);
                link.click();
                postcard.style.transform = originalTransform;
            });
        });

        window.onload = fitText;
    </script>
</body>
</html>
