<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Generatore 'O Strunz - Finale</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Economica:wght@700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: sans-serif; background-color: #1a1a1a; display: flex; flex-direction: column; min-height: 100vh; }

        /* HEADER E COMANDI */
        #top-header { background: #fff; text-align: center; padding: 15px 10px 5px; font-family: 'Economica', sans-serif; font-size: 24px; color: #8b0000; text-transform: uppercase; }
        
        #panel { background: #fff; padding: 10px 20px 20px; display: flex; flex-direction: column; gap: 12px; border-bottom: 4px solid #8b0000; width: 100%; }
        
        .box { display: flex; flex-direction: column; gap: 4px; width: 100%; }
        label { font-size: 11px; font-weight: bold; color: #666; text-transform: uppercase; }
        
        textarea { width: 100%; height: 140px; padding: 12px; font-size: 16px; border: 1px solid #ccc; border-radius: 6px; resize: none; font-family: sans-serif; }
        input { width: 100%; padding: 12px; font-size: 16px; border: 1px solid #ccc; border-radius: 6px; }
        
        #btn-save { background: #8b0000; color: #fff; padding: 16px; border: none; border-radius: 6px; font-weight: bold; text-transform: uppercase; font-size: 16px; cursor: pointer; }

        /* AREA ANTEPRIMA */
        #preview-box { flex-grow: 1; display: flex; justify-content: center; align-items: flex-start; padding: 20px 0; overflow: hidden; }

        /* LA CARTOLINA 1024x1024 */
        #postcard {
            width: 1024px;
            height: 1024px;
            background-image: url('sfondo.png');
            background-size: cover;
            background-position: center;
            background-color: #fff;
            position: relative;
            flex-shrink: 0;
            display: flex;
            flex-direction: column;
        }

        /* Testo Battuta - 75px CENTRATO VERTICALMENTE */
        #joke-wrap {
            height: 850px; /* Area estesa per migliorare la centratura */
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 0 80px;
            /* Spostamento verso il basso per centratura visiva ottimale */
            padding-top: 120px; 
        }

        #out-text {
            font-family: 'Economica', sans-serif;
            font-weight: 700;
            color: #000;
            line-height: 1.05;
            font-size: 75px; 
            word-wrap: break-word;
            width: 100%;
        }

        /* Autore - 70px IN BASSO */
        #author-wrap {
            position: absolute;
            bottom: 40px; 
            width: 100%;
            text-align: center;
        }

        #out-author {
            font-family: 'Economica', sans-serif;
            font-weight: 700;
            color: #8B0000;
            font-size: 70px;
        }

        /* Scalatura per cellulari */
        @media (max-width: 1024px) {
            #postcard {
                transform: scale(0.33);
                transform-origin: top center;
            }
        }
    </style>
</head>
<body>

    <!-- MODIFICA 3: Titolo aggiornato -->
    <div id="top-header">Generatore di CARTOLINE per 'O Strunz</div>

    <div id="panel">
        <div class="box">
            <label>Battuta</label>
            <!-- MODIFICA 2: Testo vuoto per rapidità -->
            <textarea id="in-joke" placeholder="Inserisci qui il testo..."></textarea>
        </div>
        <div class="box">
            <label>Autore</label>
            <!-- MODIFICA 2: Valore vuoto per rapidità -->
            <input type="text" id="in-name" placeholder="Nome autore" value="">
        </div>
        <button id="btn-save">SALVA CARTOLINA</button>
    </div>

    <div id="preview-box">
        <div id="postcard">
            <div id="joke-wrap">
                <div id="out-text"></div>
            </div>
            <div id="author-wrap">
                <div id="out-author"></div>
            </div>
        </div>
    </div>

    <script>
        const inJoke = document.getElementById('in-joke');
        const inName = document.getElementById('in-name');
        const outText = document.getElementById('out-text');
        const outAuthor = document.getElementById('out-author');
        const postcard = document.getElementById('postcard');
        const btnSave = document.getElementById('btn-save');

        function refresh() {
            outText.innerText = inJoke.value;
            
            let size = 75;
            outText.style.fontSize = size + "px";
            
            while (outText.scrollHeight > 720 && size > 15) {
                size -= 2;
                outText.style.fontSize = size + "px";
            }

            const nome = inName.value.trim();
            outAuthor.innerText = nome ? "[" + nome + "]" : "";
        }

        inJoke.oninput = refresh;
        inName.oninput = refresh;

        btnSave.onclick = function() {
            btnSave.innerText = "ELABORAZIONE...";
            btnSave.style.opacity = "0.5";

            const originalTransform = postcard.style.transform;
            postcard.style.transform = "none";

            setTimeout(() => {
                html2canvas(postcard, {
                    width: 1024,
                    height: 1024,
                    scale: 3,
                    useCORS: true,
                    allowTaint: true
                }).then(canvas => {
                    const link = document.createElement('a');
                    link.download = 'cartolina-ostrunz.png';
                    link.href = canvas.toDataURL('image/png');
                    link.click();
                    
                    postcard.style.transform = originalTransform;
                    btnSave.innerText = "SALVA CARTOLINA";
                    btnSave.style.opacity = "1";
                }).catch(err => {
                    alert("Errore: " + err);
                    postcard.style.transform = originalTransform;
                    btnSave.innerText = "SALVA CARTOLINA";
                });
            }, 500);
        };

        window.onload = refresh;
    </script>
</body>
</html>
