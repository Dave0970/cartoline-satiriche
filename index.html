<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Generatore 'O Strunz - Fix</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Economica:wght@700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body { 
            font-family: sans-serif; 
            background-color: #1a1a1a; 
            display: flex; 
            flex-direction: column; 
            min-height: 100vh; 
        }

        /* Logo Titolo */
        #header-logo {
            font-family: 'Economica', sans-serif;
            font-weight: 700;
            color: #8b0000;
            text-align: center;
            background: #fff;
            padding: 15px 10px 5px 10px;
            font-size: 26px;
            text-transform: uppercase;
        }

        /* Pannello Controlli a larghezza piena */
        #controls { 
            background: #fff; 
            padding: 10px 20px 20px 20px; 
            display: flex; 
            flex-direction: column; 
            gap: 12px; 
            width: 100%;
            border-bottom: 3px solid #8b0000;
        }

        .input-group { 
            display: flex; 
            flex-direction: column; 
            gap: 4px; 
            width: 100%; 
        }

        label { font-size: 11px; font-weight: bold; color: #666; text-transform: uppercase; }
        
        textarea { 
            width: 100%;
            height: 140px; 
            padding: 12px; 
            font-size: 16px; 
            border: 1px solid #ccc; 
            border-radius: 6px; 
            resize: none; 
        }

        input { 
            width: 100%;
            padding: 12px; 
            font-size: 16px; 
            border: 1px solid #ccc; 
            border-radius: 6px; 
        }
        
        #btn-save { 
            background: #8b0000; 
            color: white; 
            padding: 16px; 
            border: none; 
            border-radius: 6px; 
            font-weight: bold; 
            text-transform: uppercase; 
            cursor: pointer;
            font-size: 16px;
        }

        /* Area Anteprima */
        #viewer { 
            flex-grow: 1; 
            display: flex; 
            justify-content: center; 
            align-items: flex-start; 
            padding: 20px; 
        }

        /* IL QUADRATO HD (1024x1024) */
        #postcard {
            width: 1024px;
            height: 1024px;
            background-image: url('sfondo.png'); 
            background-size: cover;
            background-position: center;
            display: flex;
            flex-direction: column;
            position: relative;
            background-color: white;
            flex-shrink: 0;
        }

        /* Area Battuta: Centrata perfettamente */
        #joke-container {
            flex-grow: 1; /* Prende tutto lo spazio tra sopra e l'autore */
            width: 85%;
            margin: 0 auto;
            display: flex;
            align-items: center; /* Centra verticale */
            justify-content: center; /* Centra orizzontale */
            text-align: center;
            padding-top: 60px; /* Piccolo margine per non toccare il bordo alto */
        }

        #display-text {
            font-family: 'Economica', sans-serif;
            font-weight: 700;
            color: #000;
            line-height: 1.05;
            word-wrap: break-word;
            width: 100%;
            font-size: 75px; 
        }

        /* Area Autore fissata in basso */
        #author-container {
            height: 200px; 
            display: flex;
            align-items: flex-end;
            justify-content: center;
            padding-bottom: 40px; 
        }

        #display-author {
            font-family: 'Economica', sans-serif;
            font-weight: 700;
            color: #8B0000;
            font-size: 70px; 
            text-align: center;
        }

        /* Scalatura Mobile */
        @media (max-width: 1024px) {
            #postcard {
                transform: scale(0.33);
                transform-origin: top center;
            }
        }
    </style>
</head>
<body>

    <div id="header-logo">Generatore di battute per 'O Strunz</div>
    
    <div id="controls">
        <div class="input-group">
            <label>Battuta</label>
            <textarea id="in-text">Inserisci qui la tua battuta...</textarea>
        </div>
        <div class="input-group">
            <label>Autore</label>
            <input type="text" id="in-author" value="Mauro Morandi">
        </div>
        <button id="btn-save">Salva Cartolina</button>
    </div>

    <div id="viewer">
        <div id="postcard">
            <div id="joke-container">
                <h1 id="display-text">Inserisci qui la tua battuta...</h1>
            </div>
            <div id="author-container">
                <div id="display-author">[Mauro Morandi]</div>
            </div>
        </div>
    </div>

        const displayAuthor = document.getElementById('display-author');
